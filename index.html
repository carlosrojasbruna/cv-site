<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Academic CV</title>
  <meta name="description" id="page-desc" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">

  <!-- ── DATA FILES — edit these, never edit this file ── -->
  <script src="data/profile.js"></script>
  <script src="data/education.js"></script>
  <script src="data/experience.js"></script>
  <script src="data/publications.js"></script>
  <script src="data/projects.js"></script>
  <script src="data/conferences.js"></script>
  <script src="data/collaborations.js"></script>
  <script src="data/teaching.js"></script>
  <script src="data/service.js"></script>
  <script src="data/certifications.js"></script>
  <script src="data/portfolio.js"></script>

  <style>
    :root {
      --bg:        #0c0f18;
      --bg-card:   #141824;
      --bg-card2:  #191e2e;
      --border:    rgba(255,255,255,0.07);
      --text:      #e8e4dc;
      --muted:     #8a8fa8;
      --gold:      #c9a96e;
      --gold-l:    #e8c87d;
      --teal:      #3dd6c0;
      --blue:      #6097d4;
      --green:     #52c98a;
      --yellow:    #e8c44a;
      --red:       #d46868;
      --r:         10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }

    /* ── LAYOUT ── */
    .layout { display: grid; grid-template-columns: 270px 1fr; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
      background: var(--bg-card); border-right: 1px solid var(--border);
      padding: 2.2rem 1.5rem; display: flex; flex-direction: column; gap: 1.8rem;
      scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar { display: none; }
    .sb-avatar {
      width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #c9a96e22, #3dd6c022);
      border: 2px solid var(--gold); display: flex; align-items: center;
      justify-content: center; font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 600; color: var(--gold);
    }
    .sb-name { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; line-height: 1.3; }
    .sb-title { font-size: 0.74rem; color: var(--muted); line-height: 1.5; margin-top: 0.25rem; }
    .sb-contact { display: flex; flex-direction: column; gap: 0.45rem; }
    .sb-link { display: flex; align-items: flex-start; gap: 0.45rem; font-size: 0.75rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .sb-link:hover { color: var(--gold); }
    .sb-icon { width: 13px; height: 13px; flex-shrink: 0; margin-top: 2px; opacity: 0.55; }
    .sb-nav { display: flex; flex-direction: column; gap: 0.1rem; }
    .nav-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.3rem; font-weight: 600; }
    .nav-link { font-size: 0.8rem; color: var(--muted); text-decoration: none; padding: 0.28rem 0.55rem; border-radius: 5px; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem; }
    .nav-link:hover, .nav-link.active { color: var(--gold); background: rgba(201,169,110,0.1); }
    .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); opacity: 0.35; flex-shrink: 0; }
    .nav-link.active .nav-dot { opacity: 1; }
    .sb-footer { margin-top: auto; font-size: 0.7rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 1rem; line-height: 1.6; }

    /* ── MAIN ── */
    .main { padding: 3.5rem 3.5rem 6rem; max-width: 800px; }

    /* ── SECTION ── */
    section { margin-bottom: 4rem; animation: fadeUp 0.5s ease both; }
    section:nth-child(1)  { animation-delay: .05s }
    section:nth-child(2)  { animation-delay: .10s }
    section:nth-child(3)  { animation-delay: .15s }
    section:nth-child(4)  { animation-delay: .20s }
    section:nth-child(5)  { animation-delay: .25s }
    section:nth-child(6)  { animation-delay: .30s }
    section:nth-child(7)  { animation-delay: .35s }
    section:nth-child(8)  { animation-delay: .40s }
    section:nth-child(9)  { animation-delay: .45s }
    section:nth-child(10) { animation-delay: .50s }
    section:nth-child(11) { animation-delay: .55s }
    section:nth-child(12) { animation-delay: .60s }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }

    .sec-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--gold); font-weight: 600; margin-bottom: 0.5rem; font-family: 'DM Mono', monospace; }
    .sec-title { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; font-weight: 600; color: var(--text); line-height: 1.2; margin-bottom: 1.4rem; }
    .divider { width: 36px; height: 2px; background: var(--gold); margin-bottom: 1.6rem; border-radius: 1px; }

    /* ── HERO ── */
    .hero-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 5vw, 3.4rem); font-weight: 300; line-height: 1.1; margin-bottom: 0.4rem; }
    .hero-name em { font-style: italic; color: var(--gold-l); }
    .hero-role { font-size: 0.82rem; font-family: 'DM Mono', monospace; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 1.8rem; }
    .hero-role span { color: var(--gold); }
    .bio-text { font-size: 0.95rem; color: #b8b4ac; line-height: 1.85; max-width: 600px; margin-bottom: 0.9rem; }

    /* ── STATS ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.9rem; margin-top: 2rem; }
    .stat-card { background: var(--bg-card2); border: 1px solid var(--border); border-radius: var(--r); padding: 1.1rem 1.2rem; transition: border-color 0.2s, transform 0.2s; }
    .stat-card:hover { border-color: rgba(201,169,110,0.3); transform: translateY(-2px); }
    .stat-n { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 600; color: var(--gold); line-height: 1; }
    .stat-l { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

    /* ── RESEARCH AREAS ── */
    .area-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
    .area-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.2rem 1.4rem; transition: border-color 0.2s; }
    .area-card:hover { border-color: rgba(201,169,110,0.25); }
    .area-icon { font-size: 1.2rem; margin-bottom: 0.5rem; display: block; }
    .area-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 0.28rem; margin-top: 0.4rem; }
    .tag { font-size: 0.68rem; font-family: 'DM Mono', monospace; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--muted); padding: 0.12rem 0.45rem; border-radius: 3px; }

    /* ── CURRENT RESEARCH ── */
    .cr-list { display: flex; flex-direction: column; gap: 0.65rem; }
    .cr-item { background: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid var(--gold); border-radius: 0 var(--r) var(--r) 0; padding: 0.85rem 1.2rem; font-size: 0.86rem; color: #bbb6ad; line-height: 1.5; transition: background 0.2s; }
    .cr-item:hover { background: var(--bg-card2); }

    /* ── TIMELINE (education & experience) ── */
    .timeline { position: relative; padding-left: 1.6rem; }
    .timeline::before { content: ''; position: absolute; left: 5px; top: 6px; bottom: 6px; width: 1px; background: linear-gradient(to bottom, var(--gold), transparent); }
    .tl-item { position: relative; padding-bottom: 1.8rem; }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-item::before { content: ''; position: absolute; left: -1.38rem; top: 6px; width: 8px; height: 8px; border-radius: 50%; background: var(--gold); border: 2px solid var(--bg); }
    .tl-year { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--gold); letter-spacing: 0.04em; margin-bottom: 0.15rem; }
    .tl-main { font-family: 'Cormorant Garamond', serif; font-size: 1.02rem; font-weight: 600; color: var(--text); line-height: 1.3; }
    .tl-sub { font-size: 0.79rem; color: var(--muted); margin-top: 0.1rem; line-height: 1.4; }

    /* ── PUBLICATIONS ── */
    .pub-filter { display: flex; gap: 0.4rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .filter-btn { font-size: 0.72rem; font-family: 'DM Mono', monospace; padding: 0.25rem 0.7rem; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.on { border-color: var(--gold); color: var(--gold); background: rgba(201,169,110,0.1); }
    .pub-list { display: flex; flex-direction: column; gap: 0.7rem; }
    .pub-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.3rem; transition: border-color 0.2s; }
    .pub-item:hover { border-color: rgba(201,169,110,0.2); }
    .pub-item[data-hidden="true"] { display: none; }
    .pub-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.35rem; }
    .pub-badge { font-size: 0.63rem; font-family: 'DM Mono', monospace; padding: 0.1rem 0.45rem; border-radius: 3px; border: 1px solid; flex-shrink: 0; margin-top: 2px; }
    .badge-published  { color: var(--gold);  border-color: rgba(201,169,110,.4); background: rgba(201,169,110,.08); }
    .badge-accepted   { color: var(--green); border-color: rgba(82,201,138,.4);  background: rgba(82,201,138,.08); }
    .badge-review     { color: var(--yellow);border-color: rgba(232,196,74,.4);  background: rgba(232,196,74,.08); }
    .pub-title { font-size: 0.88rem; color: var(--text); font-style: italic; line-height: 1.45; }
    .pub-authors { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }
    .pub-venue { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
    .pub-doi { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--teal); text-decoration: none; margin-top: 0.2rem; display: inline-block; }
    .pub-doi:hover { text-decoration: underline; }

    /* ── PROJECTS ── */
    .proj-list { display: flex; flex-direction: column; gap: 0.65rem; }
    .proj-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.3rem; transition: border-color 0.2s; }
    .proj-item:hover { border-color: rgba(201,169,110,0.2); }
    .proj-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; gap: 0.4rem; flex-wrap: wrap; }
    .proj-year { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--gold); }
    .proj-badges { display: flex; gap: 0.3rem; }
    .proj-title { font-size: 0.86rem; color: var(--text); font-style: italic; line-height: 1.45; }
    .proj-funder { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; font-family: 'DM Mono', monospace; font-style: normal; }
    .badge-pi     { color: var(--gold);  border-color: rgba(201,169,110,.4); background: rgba(201,169,110,.08); }
    .badge-coi    { color: var(--blue);  border-color: rgba(96,151,212,.4);  background: rgba(96,151,212,.08); }
    .badge-member { color: var(--muted); border-color: rgba(255,255,255,.1);  background: rgba(255,255,255,.03); }
    .badge-awarded    { color: var(--green); border-color: rgba(82,201,138,.4); background: rgba(82,201,138,.08); }
    .badge-notawarded { color: var(--muted); border-color: rgba(255,255,255,.1); background: rgba(255,255,255,.03); }

    /* ── CONFERENCES ── */
    .conf-list { display: flex; flex-direction: column; gap: 0.65rem; }
    .conf-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 0.9rem 1.2rem; transition: border-color 0.2s; }
    .conf-item:hover { border-color: rgba(61,214,192,0.2); }
    .conf-head { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
    .conf-year { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--teal); }
    .badge-upcoming { color: var(--teal);   border-color: rgba(61,214,192,.4); background: rgba(61,214,192,.08); }
    .badge-presented{ color: var(--muted);  border-color: rgba(255,255,255,.1);background: rgba(255,255,255,.03);}
    .conf-title { font-size: 0.86rem; color: var(--text); font-style: italic; line-height: 1.4; }
    .conf-event { font-size: 0.76rem; color: var(--muted); margin-top: 0.2rem; }
    .conf-loc   { font-size: 0.72rem; color: var(--muted); font-family: 'DM Mono', monospace; }
    .conf-note  { font-size: 0.72rem; color: var(--yellow); margin-top: 0.2rem; }

    /* ── COLLABORATIONS ── */
    .collab-list { display: flex; flex-direction: column; gap: 0.7rem; }
    .collab-item { background: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: 0 var(--r) var(--r) 0; padding: 1rem 1.2rem; }
    .collab-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
    .collab-year { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--blue); }
    .collab-type { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; background: rgba(255,255,255,.03); border: 1px solid var(--border); padding: 0.1rem 0.4rem; border-radius: 3px; }
    .collab-inst { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: var(--text); }
    .collab-detail { font-size: 0.79rem; color: var(--muted); margin-top: 0.2rem; line-height: 1.5; }
    .collab-funder { font-size: 0.73rem; color: var(--yellow); margin-top: 0.25rem; font-family: 'DM Mono', monospace; }

    /* ── TEACHING ── */
    .teach-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.3rem 1.6rem; }
    .teach-inst { font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem; font-family: 'DM Mono', monospace; }
    .teach-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .teach-item { display: flex; align-items: flex-start; gap: 0.6rem; font-size: 0.86rem; color: var(--text); }
    .teach-item::before { content: '›'; color: var(--gold); font-size: 1rem; flex-shrink: 0; margin-top: -1px; }

    /* ── SERVICE ── */
    .serv-list { display: flex; flex-direction: column; gap: 0.7rem; }
    .serv-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.3rem; }
    .serv-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem; }
    .serv-year { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--gold); }
    .serv-role { font-size: 0.8rem; color: var(--gold-l); font-weight: 600; margin-bottom: 0.1rem; }
    .serv-body { font-size: 0.85rem; color: var(--text); line-height: 1.4; }
    .serv-detail { font-size: 0.76rem; color: var(--muted); margin-top: 0.2rem; line-height: 1.5; }

    /* ── CERTIFICATIONS ── */
    .cert-card-wrap { display: flex; align-items: flex-start; gap: 2rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.4rem 1.8rem; margin-bottom: 0.9rem; transition: border-color 0.2s; }
    .cert-card-wrap:hover { border-color: rgba(201,169,110,0.25); }
    .credly-wrap { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .cert-card-body { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; padding-top: 0.4rem; }
    .cert-name-link { text-decoration: none; }
    .cert-name { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; color: var(--text); line-height: 1.3; transition: color 0.2s; }
    .cert-name-link:hover .cert-name { color: var(--gold); }
    .cert-issuer { font-size: 0.75rem; color: var(--muted); }
    .cert-skills { display: flex; flex-wrap: wrap; gap: 0.28rem; }
    .cert-verify { font-size: 0.72rem; font-family: 'DM Mono', monospace; color: var(--teal); text-decoration: none; margin-top: 0.3rem; display: inline-block; transition: letter-spacing 0.2s; }
    .cert-verify:hover { letter-spacing: 0.03em; }
    .cs { font-size: 0.67rem; font-family: 'DM Mono', monospace; padding: 0.12rem 0.45rem; border-radius: 3px; border: 1px solid; }
    .cs-blue   { color: #4285F4; border-color: rgba(66,133,244,.35); background: rgba(66,133,244,.08); }
    .cs-green  { color: #34A853; border-color: rgba(52,168,83,.35);  background: rgba(52,168,83,.08); }
    .cs-yellow { color: #FBBC04; border-color: rgba(251,188,4,.35);  background: rgba(251,188,4,.08); }
    .cs-red    { color: #EA4335; border-color: rgba(234,67,53,.35);  background: rgba(234,67,53,.08); }

    /* ── PORTFOLIO ── */
    .portfolio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .port-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.4rem; text-decoration: none; display: flex; flex-direction: column; gap: 0.75rem; transition: all 0.25s; position: relative; overflow: hidden; }
    .port-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--teal), var(--blue)); transform: scaleX(0); transition: transform 0.3s; transform-origin: left; }
    .port-card:hover { border-color: rgba(61,214,192,.25); transform: translateY(-3px); }
    .port-card:hover::after { transform: scaleX(1); }
    .port-hd { display: flex; justify-content: space-between; align-items: center; }
    .port-label { font-size: 0.63rem; font-family: 'DM Mono', monospace; color: var(--teal); text-transform: uppercase; letter-spacing: 0.08em; }
    .port-ext { font-size: 0.68rem; font-family: 'DM Mono', monospace; color: var(--muted); background: rgba(255,255,255,.03); border: 1px solid var(--border); padding: 0.1rem 0.35rem; border-radius: 3px; }
    .port-title { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; color: var(--text); line-height: 1.35; }
    .port-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.6; flex: 1; }
    .port-stats { display: flex; gap: 1rem; }
    .port-stat-n { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--teal); line-height: 1; }
    .port-stat-l { font-size: 0.65rem; color: var(--muted); font-family: 'DM Mono', monospace; }
    .port-tools { display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .port-tool { font-size: 0.65rem; font-family: 'DM Mono', monospace; background: rgba(61,214,192,.06); border: 1px solid rgba(61,214,192,.2); color: var(--teal); padding: 0.1rem 0.4rem; border-radius: 3px; }
    .port-cta { font-size: 0.72rem; font-family: 'DM Mono', monospace; color: var(--teal); display: flex; align-items: center; gap: 0.3rem; transition: gap 0.2s; }
    .port-card:hover .port-cta { gap: 0.6rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 1.4rem; flex-direction: row; flex-wrap: wrap; gap: 1rem; }
      .sb-nav { display: none; }
      .main { padding: 2rem 1.4rem 4rem; }
      .stats-row, .area-grid, .portfolio-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 500px) {
      .stats-row, .area-grid, .portfolio-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR (rendered by JS) -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- MAIN (rendered by JS) -->
  <main class="main" id="main"></main>

</div>

<script>
// ════════════════════════════════════════════════════════════
//  RENDERER — do not edit below unless you know what you're doing
// ════════════════════════════════════════════════════════════

const p = DATA_PROFILE;
const $ = id => document.getElementById(id);

// ── helpers ──────────────────────────────────────────────────
const el = (tag, cls, html) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
};
const badge = (cls, text) => `<span class="pub-badge ${cls}">${text}</span>`;
const projBadge = (cls, text) => `<span class="pub-badge ${cls}">${text}</span>`;

function statusBadge(status) {
  if (status === 'published')    return badge('badge-published', 'Published');
  if (status === 'accepted')     return badge('badge-accepted', 'Accepted');
  if (status === 'under-review') return badge('badge-review', 'Under Review');
  return '';
}

}

{

// 6 · PUBLICATIONS
{
  const filters = [
    { key: 'all',          label: 'All' },
    { key: 'published',    label: 'Published' },
    { key: 'accepted',     label: 'Accepted' },
    { key: 'under-review', label: 'Under Review' },
    { key: 'journal',      label: 'Journals' },
    { key: 'book-chapter', label: 'Book Chapters' },
  ];

  const pubHtml = DATA_PUBLICATIONS.map((pub, i) => {
    const doiLink = pub.doi
      ? `<a class="pub-doi" href="https://doi.org/${pub.doi}" target="_blank">DOI: ${pub.doi}</a>`
      : '';
    return `
      <div class="pub-item" data-status="${pub.status}" data-type="${pub.type}">
        <div class="pub-head">
          <div>${pub.year ? `<span style="font-family:'DM Mono',monospace;font-size:.68rem;color:var(--gold)">${pub.year}</span> ` : ''}${statusBadge(pub.status)}</div>
        </div>
        <div class="pub-title">${pub.title}</div>
        <div class="pub-authors">${pub.authors}</div>
        <div class="pub-venue">${pub.venue}</div>
        ${doiLink}
      </div>
    `;
  }).join('');

  const filterBtns = filters.map(f =>
    `<button class="filter-btn${f.key === 'all' ? ' on' : ''}" data-filter="${f.key}">${f.label}</button>`
  ).join('');

  const s = document.createElement('section');
  s.id = 'publications';
  s.innerHTML = `
    <div class="sec-label">Scholarship</div>
    <h2 class="sec-title">Publications</h2>
    <div class="divider"></div>
    <div class="pub-filter">${filterBtns}</div>
    <div class="pub-list" id="pub-list">${pubHtml}</div>
  `;
  main.appendChild(s);

  // filter logic (deferred to after DOM insertion)
  setTimeout(() => {
    s.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        s.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
        const f = btn.dataset.filter;
        s.querySelectorAll('.pub-item').forEach(item => {
          const show = f === 'all' || item.dataset.status === f || item.dataset.type === f;
          item.dataset.hidden = show ? 'false' : 'true';
          item.style.display = show ? '' : 'none';
        });
      });
    });
  }, 0);
}

{

    return `

// ── ACTIVE NAV ON SCROLL ────────────────────────────────────
const sectionEls = document.querySelectorAll('section[id]');
const navLinks   = document.querySelectorAll('.nav-link');
const observer   = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      navLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + e.target.id));
    }
  });
}, { threshold: 0.2 });
sectionEls.forEach(s => observer.observe(s));
</script>
